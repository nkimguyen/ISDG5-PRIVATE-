<!DOCTYPE html>
<html>
    <head>
        <title>User Registration Form</title>
        <link rel="stylesheet" href="style.css" />
    </head>


    <body class = "auth-page"> 
        <h1> 
            <a href="index.html" class="logo-link">IoT Marketplace</a>
        </h1>

        <p> Sign up to get started.</p>

        <div class="content-container">
            <h1>User Registration Form</h1>
            <form id="register-form">
                <table>
                    <tr>
                        <td><label for="email">Email</label></td>
                        <td>
                        <input type="email" id="email" name="email" />
                        <small id="email-error" class="error-message"></small>
                        </td>
                    </tr>
                    <tr>
                        <td><label for="first_name">First Name</label></td>
                        <td><input type="text" id="first_name" name="first_name" /></td>
                    </tr>
                    <tr>
                        <td><label for="last_name">Last Name</label></td>
                        <td><input type="text" id="last_name" name="last_name" /></td>
                    </tr>
                    <tr>
                        <td><label for="password">Password</label></td>
                        <td>
                        <input type="password" id="password" name="password" />
                        <small id="password-error" class="error-message"></small>
                        </td>
                    </tr>
                    <tr>
                        <td><label for="tos">Term of Service</label></td>
                        <td>
                        <input type="checkbox" id="tosCheckbox" name="option1" value="yes" required />
                        </td>
                    </tr>
                    <tr>
                        <td><button type="reset" class="btn btn-secondary">Cancel</button></td>
                        <td><button type="submit" class="btn btn-primary">Register</button></td>
                    </tr>
                    <tr>
                        <td colspan="2">
                        <a href="login.html" id="login-link" style="display: none">
                            Already have an account? Login here
                        </a>
                        </td>
                    </tr>
                </table>
                <small id="form-error" class="error-message"></small>
            </form>
            <p> Have an account? <a href="login.html">Log In</a></p>
            
        </div>
        <script src="register.js"></script>

        <p>
            Are you a staff member? 
            <a href="staff_register.html">Register</a>
        </p> 
    </body>

</html>
