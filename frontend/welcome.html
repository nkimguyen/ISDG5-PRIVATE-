<!doctype html>
<html>
  <head>
    <title>Account Page</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-left">
        <a href="index.html">
          <i class="fa fa-fw fa-home"></i> Home
        </a>
      </div>
      <div class="nav-center">
        <form class="search-form">
          <input type="text" placeholder="Search..." name="search">
          <button type="submit"><i class="fa fa-search"></i></button>
        </form>
      </div>
      <div class="nav-right">
        <div class="dropdown">
          <button onclick="myFunction()" class="dropbtn active">
            <i class="fa fa-user"></i> Account 
            <i class="fa fa-caret-down"></i>
          </button>
            <div id="myDropdown" class="dropdown-content">
              <a href="login.html">Login</a>
              <a href="register.html">Register</a>
            </div>
        </div>
      </div>
      <a href="cart.html"><i class="fa fa-shopping-cart"></i> Cart</a>
    </nav>

    
    <div class="account-page">
      <div class="account-main">
        <div class="account-box">
          <h2>Profile Details</h2>
          <div class="details-box">
            <p id="welcome-message"></p>
            <form id="account-form">
              <label for="first_name">First Name</label>
              <input type="text" id="first_name" readonly>

              <label for="last_name">Last Name</label>
              <input type="text" id="last_name" readonly>

              <label for="email">Email</label>
              <input type="email" id="email" readonly>

               <label for="address">Address</label>
               <input type="text" id="address">
               <label for="phone">Phone Number</label>
               <input type="text" id="phone">
               <label for="password">Password</label>
               <input type="password" id="password">
               <div class="button-row">
                <button type="submit" class="btn btn-primary">Save Details</button>
                <button type="button" id="cancelRegistrationBtn" class="btn btn-secondary">Cancel Registration</button>
              </div>
            </form>
            <p id="account-status"></p>
          </div>
        </div>
        <div class="account-box">
          <h2>My Orders</h2>
          <div class="account-grid">
            <div class="account-item">
              <i class="fa fa-archive"></i>
              <p><a href="order.html">View your orders</a></p>
            </div>
            <div class="account-item">
              <i class="fa fa-credit-card"></i>
              <p>Payment details</p>
            </div>
          </div>
        </div>


        <div class= "log-box">
            <h2>User Logs</h2>
            <div class="log-grid">
                <i class="fa fa-credit-card"></i>
                <p>User Log History</p>
            </div>
        </div>

        </div>
        <div class="account-sidebar">
          <a href="logout.html" id="logoutLink"><i class="fa fa-sign-out"></i> Logout</a>
        </div>
    </div>
    <script src="welcome.js"></script>
  </body>
</html>
