<!doctype html>
<html>
  <head>
    <title>Account Page</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  </head>
  <body>
       <nav class="navbar">

            <div class="nav-left">
                <a href="index.html">
                <i class="fa fa-fw fa-home"></i> Home
                </a>
            </div>

            <div class="nav-center">
                <form class="search-form">
                    <input type="text" placeholder="Search..." name="search">
                    <button type="submit"><i class="fa fa-search"></i></button>
                </form>
            </div>

            <div class="nav-right">
                <div class="dropdown">
                    <button onclick="myFunction()" class="dropbtn active">
                      <i class="fa fa-user"></i> Account 
                      <i class="fa fa-caret-down"></i>
                    </button>
                    <div id="myDropdown" class="dropdown-content">
                        <a href="login.html">Login</a>
                        <a href="register.html">Register</a>
                    </div>
                </div>

                <a href="cart.html"><i class="fa fa-shopping-cart"></i> Cart</a>
            </div>
        </nav>

      <div class="account-container">
        <h1>My Account</h1>
        <p id="welcome-message"></p>

        <form id="account-form">
            <table>
                <tr>
                    <td><label for="first_name">First Name</label></td>
                    <td><input type="text" id="first_name" name="first_name" readonly></td>
                </tr>
                <tr>
                    <td><label for="last_name">Last Name</label></td>
                    <td><input type="text" id="last_name" name="last_name" readonly></td>
                </tr>
                <tr>
                    <td><label for="email">Email</label></td>
                    <td><input type="email" id="email" name="email" readonly></td>
                </tr>
                <tr>
                    <td><label for="address">Address</label></td>
                    <td><input type="text" id="address" name="address"></td>
                </tr>
                <tr>
                    <td><label for="phone">Phone Number</label></td>
                    <td><input type="text" id="phone" name="phone"></td>
                </tr>
                <tr>
                    <td><label for="password">Password</label></td>
                    <td><input type="password" id="password" name="password"></td>
                </tr>
                <tr>
                    <td><button type="submit" class="btn btn-primary">Save Details</button></td>
                    <td><button type="button" id="cancelRegistrationBtn" class="btn btn-secondary">Cancel Registration</button></td>
                </tr>
            </table>
        </form>

        <p id="account-status"></p>

        <p>
            <a href="order.html" id="order-link" class="btn btn-primary">Go to Orders</a>
        </p>

        <button id="logoutBtn" class="btn btn-secondary">Logout</button>
    </div>

    <script src="welcome.js"></script>
  </body>
</html>
