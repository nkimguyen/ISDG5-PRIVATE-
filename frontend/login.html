<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login Page</title>
        <link rel="stylesheet" href="style.css">
    </head>


    <body class = "auth-page">
        <h1>
            <a href="index.html" class="logo-link">IoT Marketplace</a>
        </h1>
        <p> Log in to your account</p>
        <div class="content-container">
            <h1> User Login Form</h1>
            <form id="login-form">
                <table>
                 <tr>
                    <td><label for="email">Email</label></td>
                    <td>
                    <input type="email" id="email" name="email" required />
                    <small id="email-error" class="error-message"></small>
                    </td>
                </tr>
                <tr>
                    <td><label for="first_name">First Name</label></td>
                    <td>
                    <input type="text" id="first_name" name="first_name" required />
                    <small id="name-error" class="error-message"></small>
                    </td>
                </tr>
                <tr>
                    <td><label for="last_name">Last Name</label></td>
                    <td>
                    <input type="text" id="last_name" name="last_name" required />
                    <small id="last-name-error" class="error-message"></small>
                    </td>
                </tr>
                <tr>
                    <td><label for="password">Password</label></td>
                    <td>
                    <input type="password" id="password" name="password" required/>
                    <small id="password-error" class="error-message"></small>
                    </td>
                </tr>
                <tr>
                    <td><button type="reset" class="btn btn-secondary">Cancel</button></td>
                    <td><button type="submit" class ="btn btn-primary">Login</button></td>
                </tr>
                </table>
                <small id="form-error" class="error-message"></small>
            </form>
            <p> Don't have an account? <a href="register.html">Register</a></p>
        </div>
        <script src="login.js"></script>
    </body>

</html>
